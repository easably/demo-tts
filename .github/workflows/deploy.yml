name: Deploy demo UI

# Primary sync: easably/tada and easably/dots-tts CI rsync vendor/demo-tts →
# ~/deploy/shared/demo-tts on every backend/demo deploy.
# Use this workflow only for demo-only hotfixes (workflow_dispatch).

on:
  workflow_dispatch:

# Repository variables: DEPLOY_USER, DEPLOY_HOST, DEPLOY_PORT (optional)
# Secret: SSH_PRIVATE_KEY (same key as tada/dots-tts repos)

concurrency:
  group: deploy-demo-tts
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy variables
        run: |
          if [ -z "${DEPLOY_USER}" ] || [ -z "${DEPLOY_HOST}" ]; then
            echo "Set DEPLOY_USER and DEPLOY_HOST on this repo (or rely on tada/dots-tts deploy)."
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "Set SSH_PRIVATE_KEY secret (same as tada/dots-tts)."
            exit 1
          fi
          SSH_PORT="${DEPLOY_PORT:-22}"
          echo "SSH_PORT=${SSH_PORT}" >> "$GITHUB_ENV"
          echo "SHARED_DEMO_PATH=/home/${DEPLOY_USER}/deploy/shared/demo-tts" >> "$GITHUB_ENV"
          echo "SSH_OPTS=-i ~/.ssh/deploy_key -p ${SSH_PORT} -o ConnectTimeout=30" >> "$GITHUB_ENV"

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${SSH_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync shared demo UI
        run: |
          ssh ${SSH_OPTS} "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p ${SHARED_DEMO_PATH}"
          rsync -az --delete \
            --exclude 'config/' \
            --exclude '.git/' \
            -e "ssh ${SSH_OPTS}" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${SHARED_DEMO_PATH}/"
          echo "Demo UI synced to ${SHARED_DEMO_PATH}"
